<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financiero Responsivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #F0F4F8; /* Un azul muy pálido, para el fondo */
            --card-bg: #FFFFFF;
            --text-primary: #333333;
            --text-secondary: #777777;
            --primary-action: #2196F3;
            --positive: #4CAF50;
            --negative: #F44336;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            margin: 0;
            padding: 16px; /* Margen general para el cuerpo */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor principal de tarjetas */
        .card-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columnas para móvil */
            gap: 16px;
            width: 100%;
            max-width: 600px; /* Para PC, no se expande demasiado */
            margin-bottom: 24px;
        }

        /* Estilo de Tarjetas Principales */
        .main-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .main-card .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .main-card h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
            font-weight: 500;
        }

        .main-card p {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        /* Colores específicos de tarjetas */
        .main-card.positive p { color: var(--positive); }
        .main-card.negative p { color: var(--negative); }
        .main-card.savings p { color: var(--text-primary); }

        /* Iconos simples con texto (reemplázalos por iconos reales si los tienes) */
        .icon {
            font-size: 18px;
            opacity: 0.7;
        }

        /* Estilo para los botones de añadir */
        .add-button {
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* --- Panel de Configuración (Panel de Control Personalizado) --- */
        .section-header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
        }

        .config-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: calc(100% - 48px); /* Ajuste para el padding interno */
            max-width: 600px;
            margin-bottom: 24px;
        }

        .config-card p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* --- CORRECCIÓN CRÍTICA DE RESPONSIVIDAD (MÓVIL-FIRST) --- */
        .config-item {
            display: flex;
            flex-direction: column; /* Apila los elementos en móvil */
            width: 100%;
            margin-bottom: 16px; /* Espacio entre los bloques */
        }

        /* Estilo para las etiquetas (Labels) */
        .config-item label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px; /* Espacio para el campo de entrada */
        }

        /* Estilo para los campos de entrada (Inputs) */
        .config-item input {
            width: calc(100% - 24px); /* Ancho completo con padding */
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background-color: #f9f9f9;
        }

        /* Contenedor de los dos últimos campos para alineación en móvil */
        .flex-config-row {
            display: flex;
            gap: 16px; /* Espacio entre HOJA y CELDA */
            width: 100%;
        }

        .flex-config-row .config-item {
            flex: 1; /* Divide el espacio al 50% */
            margin-bottom: 0; /* Elimina margen inferior en este contenedor */
        }

        /* --- Media Query para PC --- */
        @media (min-width: 768px) {
            .card-container {
                grid-template-columns: repeat(4, 1fr); /* 4 columnas en PC */
            }

            .config-item {
                flex-direction: row; /* Vuelve a horizontal en PC */
                align-items: center;
                justify-content: space-between;
                width: 100%;
            }

            .config-item label {
                width: 150px; /* Ancho fijo para labels en PC */
                margin-bottom: 0; /* Sin margen inferior en PC */
            }

            .config-item input {
                width: calc(100% - 174px); /* Resto del ancho en PC */
            }
        }
        
    </style>
</head>
<body>

    <div class="card-container">
        <div class="main-card positive">
            <div class="header">
                <h3>BALANCE NETO</h3>
                <span class="icon">💼</span>
            </div>
            <p>S/ -96.39</p>
        </div>

        <div class="main-card savings">
            <div class="header">
                <h3>MIS AHORROS</h3>
                <span class="icon">✏️</span>
            </div>
            <p>S/ 43,895.50</p>
        </div>

        <div class="main-card positive">
            <div class="header">
                <h3>PRÉSTAMOS A FAVOR</h3>
                <span class="icon">📈</span>
            </div>
            <p>S/ 5,830.80</p>
        </div>

        <div class="main-card negative">
            <div class="header">
                <h3>DEUDA TARJETAS</h3>
                <span class="icon">📉</span>
            </div>
            <p>S/ -49,822.69</p>
        </div>
    </div>

    <button class="add-button">+</button>

    <div class="section-header">
        <h2>Panel de Control Personalizado</h2>
    </div>

    <div class="config-card">
        <p>Configura las credenciales de la API para sincronizar tus datos.</p>

        <div class="config-item">
            <label for="spreadsheet_id">Spreadsheet ID Clave</label>
            <input type="text" id="spreadsheet_id" value="1BxiMVs0XRA5nFMdKvBdBZjgmUUQptlbe" placeholder="Ingresa el ID de la hoja">
        </div>

        <div class="flex-config-row">
            <div class="config-item">
                <label for="hoja">Hoja / Pestaña</label>
                <input type="text" id="hoja" value="Resumen" placeholder="Pestaña">
            </div>

            <div class="config-item">
                <label for="celda">Celda Vinculada</label>
                <input type="text" id="celda" value="G5" placeholder="G5">
            </div>
        </div>
    </div>

</body>
</html>
